server {
    listen 80;
    listen 443 ssl;
    server_name salinacomunidades.salina.com.br 192.168.4.227;

    # SSL configuration (if certs exist)
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    root /home/comunidade-form/form_comunidade_salina/frontend/dist;
    index index.html;

    # Logs
    access_log /var/log/nginx/comunidade_access.log;
    error_log /var/log/nginx/comunidade_error.log debug;

    # Redirect HTTP to HTTPS (comment out for debugging)
    # if ($scheme = http) {
    #     return 301 https://$server_name$request_uri;
    # }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # FIX: Correct port from 3002 to 3001 (where backend actually runs)
        proxy_pass http://127.0.0.1:3001;
        
        # Proxy protocol and headers (safe mode)
        proxy_http_version 1.1;
        proxy_set_header Connection close;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # WebSocket support (keep for compatibility)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        
        # Buffering disabled (safe mode)
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
